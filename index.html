function useStorage(key, init) {
const [val, setVal] = useState(() => {
try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; }
});
useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
return [val, setVal];
}

function formatDate(iso) {
if(!iso) return '—';
return new Date(iso).toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric'});
}

function formatTime(iso) {
if(!iso) return '';
return new Date(iso).toLocaleString('en-NZ', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── ENCODE/DECODE PROJECT FOR SHARE LINKS ────────────────────────────────────
function encodeProject(p) {
try {
const json = JSON.stringify(p);
// utf8 safe base64
const b64 = btoa(unescape(encodeURIComponent(json)));
return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
} catch { return ''; }
}

function decodeProject(s) {
try {
let b64 = s.replace(/-/g,'+').replace(/_/g,'/');
while(b64.length % 4) b64 += '=';
const json = decodeURIComponent(escape(atob(b64)));
return JSON.parse(json);
} catch { return null; }
}

function buildShareUrl(project) {
const base = window.location.origin + window.location.pathname;
return `${base}#p=${encodeProject(project)}`;
}

function buildWhatsAppMessage(project) {
const lines = [
`📋 *${project.name}*`,
'',
`📍 *Address:* ${project.address || '—'}`,
];
if(project.parking) lines.push(`🚌 *Parking:* ${project.parking}`);
if(project.keyCollection) lines.push(`🔑 *Key collection:* ${project.keyCollection}`);
if(project.keyCode) lines.push(`🔒 *Key code / padlock:* ${project.keyCode}`);
if(project.teamLeader) lines.push(`👷 *Team Leader:* ${project.teamLeader}`);
if(project.clientName) lines.push(`🤝 *Client:* ${project.clientName}${project.clientMobile ? ' — ' + project.clientMobile : ''}`);
if(project.startDate) lines.push(`📅 *Start date:* ${formatDate(project.startDate)}`);
lines.push('');
lines.push('🔗 *Project info:* ' + buildShareUrl(project));
if(project.surveyLink) lines.push('🔍 *Quick Survey:* ' + project.surveyLink);
return lines.join('\n');
}

const [data, setData] = useState(editing || blank);
const set = k => e => setData(p => ({...p, [k]: e.target.value}));

const steps = [
{

<label style={s.label}>Project name *</label>
<input style={s.input} value={data.name} onChange={set('name')} placeholder="e.g. 80 Queen Street"/>
<div style={s.row2}>

</>
)
},

<input style={s.input} value={data.parking} onChange={set('parking')} placeholder="e.g. Street parking on Main St"/>
<label style={s.label}>Key collection</label>
<input style={s.input} value={data.keyCollection} onChange={set('keyCollection')} placeholder="e.g. From site manager at reception"/>
<label style={s.label}>Key code / padlock</label>
<input style={s.input} value={data.keyCode} onChange={set('keyCode')} placeholder="e.g. 1234 or padlock on gate"/>
</>
)
},
{
title: 'Client & contact',
fields: (
<>

<input style={s.input} value={data.clientName} onChange={set('clientName')} placeholder="Full name"/>
<label style={s.label}>Client mobile</label>
<input style={s.input} value={data.clientMobile} onChange={set('clientMobile')} placeholder="+64 21 000 0000"/>
</>
)
},
{
title: 'Links',
fields: (
<>
<label style={s.label}>WhatsApp group invite link</label>
<input style={s.input} value={data.whatsapp} onChange={set('whatsapp')} placeholder="https://chat.whatsapp.com/..."/>
<div style={{fontSize:12,color:'#555',marginTop:-8,marginBottom:16}}>
Create the group manually in WhatsApp first (e.g. "80 Queen Street"), then paste the invite link here. Tip: reset the link in WhatsApp once everyone has joined.
</div>
<label style={s.label}>Quick Survey link</label>
<input style={s.input} value={data.surveyLink} onChange={set('surveyLink')} placeholder="https://..."/>
<div style={{fontSize:12,color:'#555',marginTop:-8}}>
Paste the link to this job in your Quick Survey app. Leave blank if not yet created.
</div>
</>
)
}
];

const canNext = step === 0 ? data.name.trim() : true;

const handleSave = () => {
const project = {
...data,
id: editing?.id || Date.now().toString(),
createdAt: editing?.createdAt || new Date().toISOString()
};
onSave(project);
onClose();
};

return (
<div style={s.overlay} onClick={onClose}>
<div style={s.modal} onClick={e => e.stopPropagation()}>
<div style={s.modalHeader}>
<div>
<div style={s.modalTitle}>{editing ? 'Edit project' : 'New project'}</div>
<div style={{display:'flex',gap:6,marginTop:8,alignItems:'center'}}>
{steps.map((st,i) => (
<span key={i} style={{...s.stepDot, background: i <= step ? '#3b82f6' : '#2a2a2a', width: i===step?24:8, borderRadius: i===step?4:'50%', transition:'all 0.2s'}}/>
))}

</div>
</div>
<button style={s.closeBtn} onClick={onClose}>×</button>
</div>
<div style={s.modalBody}>{steps[step].fields}</div>
<div style={s.modalFooter}>
{step > 0
? <button style={s.cancelBtn} onClick={() => setStep(p => p-1)}>← Back</button>
: <button style={s.cancelBtn} onClick={onClose}>Cancel</button>
}
{step < steps.length - 1
? <button style={{...s.primaryBtn, opacity: canNext?1:0.5}} disabled={!canNext} onClick={() => setStep(p => p+1)}>Next →</button>
: <button style={s.primaryBtn} onClick={handleSave}>{editing ? 'Save changes' : 'Create project'}</button>

// ── SHARE MODAL ──────────────────────────────────────────────────────────────
function ShareModal({project, onClose}) {
const [copiedMsg, setCopiedMsg] = useState(false);
const [copiedLink, setCopiedLink] = useState(false);
const message = buildWhatsAppMessage(project);
const shareUrl = buildShareUrl(project);

const copy = (text, setFlag) => {
navigator.clipboard.writeText(text).then(() => {
setFlag(true);
setTimeout(() => setFlag(false), 2000);
});
};

return (
<div style={s.overlay} onClick={onClose}>
<div style={s.modal} onClick={e => e.stopPropagation()}>
<div style={s.modalHeader}>
<div style={s.modalTitle}>Share project</div>
<button style={s.closeBtn} onClick={onClose}>×</button>
</div>
<div style={s.modalBody}>

<label style={s.label}>WhatsApp message</label>
<div style={s.sharePreview}>{message}</div>
<div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
<button style={s.copyBtn} onClick={() => copy(message, setCopiedMsg)}>
{copiedMsg ? '✓ Copied' : '📋 Copy message'}
</button>
{project.whatsapp && (
<a href={project.whatsapp} target="_blank" rel="noreferrer"
style={{...s.copyBtn,background:'#14532d',color:'#4ade80',border:'1px solid #166534',textDecoration:'none'}}>
💬 Open WhatsApp group
</a>
)}
</div>

<label style={s.label}>Shareable project link</label>
<div style={s.linkBox}>{shareUrl}</div>
<button style={s.copyBtn} onClick={() => copy(shareUrl, setCopiedLink)}>
{copiedLink ? '✓ Copied' : '🔗 Copy link'}
</button>

<div style={{fontSize:11,color:'#444',marginTop:16,lineHeight:1.6}}>
The shareable link contains the project info encoded in the URL — anyone with the link can view it without logging in. No server needed.
</div>

</div>
<div style={s.modalFooter}>
<button style={s.cancelBtn} onClick={onClose}>Close</button>
</div>
</div>
</div>
);
}

// ── THREAD CONTENT ───────────────────────────────────────────────────────────
function ThreadView({project, thread, notes, setNotes}) {
const [text, setText] = useState('');
const threadNotes = (notes[project.id]?.[thread] || []).slice().reverse();

const addNote = () => {
if(!text.trim()) return;
setNotes(prev => ({
...prev,
[project.id]: {
...(prev[project.id] || {}),
[thread]: [...(prev[project.id]?.[thread] || []), {
id: Date.now().toString(),
text: text.trim(),
createdAt: new Date().toISOString()
}]
}
}));
setText('');
};

const deleteNote = (noteId) => {
setNotes(prev => ({
...prev,
[project.id]: {
...(prev[project.id] || {}),
[thread]: (prev[project.id]?.[thread] || []).filter(n => n.id !== noteId)
}
}));
};

if(thread === 'rams') {
return (
<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
<div style={{fontSize:40}}>📋</div>
<div style={{fontSize:16,fontWeight:600,color:'#e8e8e8'}}>RAMS Form</div>
<div style={{fontSize:13,color:'#555',textAlign:'center',maxWidth:320}}>Opens the RAMS form in a new tab. Fill it out, sign it and send it directly from there.</div>
<a href={RAMS_URL} target="_blank" rel="noreferrer"
style={{padding:'12px 28px',background:'#1d4ed8',borderRadius:10,color:'#fff',fontWeight:600,fontSize:14,textDecoration:'none'}}>
Open RAMS form →
</a>
</div>
);
}

if(thread === 'survey') {
return (
<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
<div style={{fontSize:40}}>🔍</div>
<div style={{fontSize:16,fontWeight:600,color:'#e8e8e8'}}>Survey</div>
{project.surveyLink
? <a href={project.surveyLink} target="_blank" rel="noreferrer"
style={{padding:'12px 28px',background:'#1d4ed8',borderRadius:10,color:'#fff',fontWeight:600,fontSize:14,textDecoration:'none'}}>
Open Quick Survey →
</a>
: <div style={{fontSize:13,color:'#555'}}>No Quick Survey link set. Edit the project to add one.</div>
}
</div>
);
}

if(thread === 'timesheet') {
return (
<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
<div style={{fontSize:40}}>⏱️</div>
<div style={{fontSize:16,fontWeight:600,color:'#e8e8e8'}}>Timesheet</div>
<div style={{fontSize:13,color:'#555'}}>Coming soon — editable timesheet for team leaders.</div>
</div>

return (
<div style={{height:'100%',display:'flex',flexDirection:'column'}}>
<div style={{flex:1,overflowY:'auto',paddingBottom:16}}>
{threadNotes.length === 0
? <div style={{...s.empty,height:'60%'}}>
<span style={s.emptyIcon}>📝</span>
<span style={{fontSize:14}}>No entries yet</span>
</div>
: threadNotes.map(n => (
<div key={n.id} style={s.note}>
<div style={s.noteText}>{n.text}</div>
<div style={{...s.noteMeta,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span>{formatTime(n.createdAt)}</span>
<button onClick={() => deleteNote(n.id)} style={{background:'none',border:'none',color:'#333',cursor:'pointer',fontSize:13,padding:'0 4px'}}>×</button>
</div>
</div>
))
}
</div>
<div style={{paddingTop:12,borderTop:'1px solid #1e1e1e'}}>
<textarea
style={s.noteInput}
value={text}
onChange={e => setText(e.target.value)}
placeholder={`Add a ${THREADS.find(t=>t.id===thread)?.label || ''} note...`}
rows={3}
onKeyDown={e => { if(e.key==='Enter' && e.metaKey) addNote(); }}
/>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span style={{fontSize:11,color:'#444'}}>⌘ + Enter to send</span>
<button style={s.sendBtn} onClick={addNote}>Add entry</button>
</div>
</div>
</div>
);
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
const [projects, setProjects] = useStorage('ral-projects', []);
const [notes, setNotes] = useStorage('ral-notes', {});
const [activeId, setActiveId] = useState(null);
const [activeThread, setActiveThread] = useState('toolbox');
const [showWizard, setShowWizard] = useState(false);
const [editing, setEditing] = useState(null);
const [showInfo, setShowInfo] = useState(false);
const [showShare, setShowShare] = useState(false);
const [sharedProject, setSharedProject] = useState(null);

// Detect shared link on load
useEffect(() => {
const checkHash = () => {
const hash = window.location.hash;
if(hash.startsWith('#p=')) {
const decoded = decodeProject(hash.slice(3));
if(decoded) setSharedProject(decoded);
} else {
setSharedProject(null);
}
};
checkHash();
window.addEventListener('hashchange', checkHash);
return () => window.removeEventListener('hashchange', checkHash);
}, []);

if(sharedProject) {
return <SharedView project={sharedProject} onExit={() => {
window.location.hash = '';
setSharedProject(null);
}}/>;
}

const project = projects.find(p => p.id === activeId);

const saveProject = (proj) => {
setProjects(prev => {
const idx = prev.findIndex(p => p.id === proj.id);
if(idx >= 0) { const n = [...prev]; n[idx] = proj; return n; }
return [proj, ...prev];
});
setActiveId(proj.id);
};

const deleteProject = (id) => {
if(!confirm('Delete this project?')) return;
setProjects(prev => prev.filter(p => p.id !== id));
if(activeId === id) setActiveId(null);
};

return (
<div style={s.app}>
{/* SIDEBAR */}
<div style={s.sidebar}>
<div style={s.sidebarHeader}>
<div style={s.logo}>RAL</div>
<div style={s.logoSub}>Rope Access Manager</div>
</div>
<button style={s.newBtn} onClick={() => { setEditing(null); setShowWizard(true); }}>
+ New project
</button>
<div style={s.projList}>
{projects.length === 0
? <div style={{fontSize:12,color:'#333',padding:'8px 12px'}}>No projects yet</div>
: projects.map(p => (
<div key={p.id}
style={{...s.projItem, ...(activeId===p.id ? s.projItemActive : s.projItemInactive)}}
onClick={() => { setActiveId(p.id); setActiveThread('toolbox'); setShowInfo(false); }}>
<div style={s.projName}>{p.name}</div>
<div style={s.projMeta}>{formatDate(p.startDate)} · {p.teamLeader || 'No leader'}</div>
</div>
))
}
</div>
</div>

{/* MAIN */}
<div style={s.main}>
{!project
? <div style={{...s.empty,height:'100%'}}>
<span style={s.emptyIcon}>🏗️</span>
<span style={{fontSize:16,color:'#333'}}>Select or create a project</span>
<button style={s.primaryBtn} onClick={() => { setEditing(null); setShowWizard(true); }}>+ New project</button>
</div>
: <>
{/* HEADER */}
<div style={s.header}>
<div>
<div style={s.headerTitle}>{project.name}</div>
<div style={s.headerMeta}>{project.address || 'No address'} · Started {formatDate(project.startDate)}</div>
</div>
<div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
{project.whatsapp && (
<a href={project.whatsapp} target="_blank" rel="noreferrer"
style={{...s.badge,background:'#14532d',color:'#4ade80',textDecoration:'none'}}>
💬 Open Chat
</a>
)}
<button style={{...s.badge,background:'#1e3a8a',color:'#93c5fd',border:'none',cursor:'pointer'}}
onClick={() => setShowShare(true)}>
↗ Share
</button>
<button style={{...s.badge,background:'#1e1e1e',color:'#888',border:'none',cursor:'pointer'}}
onClick={() => setShowInfo(v => !v)}>
{showInfo ? '▲ Hide info' : '▼ Project info'}
</button>
<button style={{...s.badge,background:'#1e1e1e',color:'#888',border:'none',cursor:'pointer'}}
onClick={() => { setEditing(project); setShowWizard(true); }}>
✏️ Edit
</button>
<button style={{...s.badge,background:'#1e1e1e',color:'#444',border:'none',cursor:'pointer'}}
onClick={() => deleteProject(project.id)}>
🗑
</button>
</div>
</div>

{/* INFO PANEL */}
{showInfo && (
<div style={s.infoPanel}>
{[
{label:'Team leader', val:project.teamLeader},
{label:'Client', val:project.clientName},
{label:'Client mobile', val:project.clientMobile},
{label:'Parking', val:project.parking},
{label:'Key collection', val:project.keyCollection},
{label:'Key code / padlock', val:project.keyCode},
{label:'WhatsApp group', val:project.whatsapp},
{label:'Quick Survey', val:project.surveyLink},
].map(({label,val}) => (
<div key={label} style={s.infoCard}>
<div style={s.infoLabel}>{label}</div>
<div style={s.infoVal}>{val || '—'}</div>
</div>
))}
</div>
)}

{/* THREADS */}
<div style={s.threadBar}>
{THREADS.map(t => (
<button key={t.id}
style={{...s.threadBtn, ...(activeThread===t.id ? s.threadBtnActive : s.threadBtnInactive)}}
onClick={() => setActiveThread(t.id)}>
{t.icon} {t.label}
</button>
))}
</div>

{/* CONTENT */}
<div style={s.content}>
<ThreadView
project={project}
thread={activeThread}
notes={notes}
setNotes={setNotes}
/>
</div>
</>
}
</div>

{showWizard && (
<Wizard
onClose={() => setShowWizard(false)}
onSave={saveProject}
editing={editing}
/>
)}

{showShare && project && (
<ShareModal project={project} onClose={() => setShowShare(false)}/>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
