// ── HOOKS ───────────────────────────────────────────────────────────────────
function useStorage(key, init) {
const [val, setVal] = useState(() => {
try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; }
});
useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
return [val, setVal];
}

function useTheme() {
const [theme, setTheme] = useState(() => {
try { return localStorage.getItem('ral-theme') || 'light'; } catch { return 'light'; }
});
useEffect(() => {
document.documentElement.setAttribute('data-theme', theme);
try { localStorage.setItem('ral-theme', theme); } catch {}
}, [theme]);
return [theme, setTheme];
}

function formatDate(iso) {
if(!iso) return '—';
return new Date(iso).toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric'});
}
function formatTime(iso) {
if(!iso) return '';
return new Date(iso).toLocaleString('en-NZ', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}
function todayISO(){ const d = new Date(); return d.toISOString().slice(0,10); }

// ── ENCODE/DECODE ───────────────────────────────────────────────────────────
function encodeObj(p) {
try { const json = JSON.stringify(p); const b64 = btoa(unescape(encodeURIComponent(json))); return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); } catch { return ''; }
}
function decodeObj(str) {
try { let b64 = str.replace(/-/g,'+').replace(/_/g,'/'); while(b64.length % 4) b64 += '='; const json = decodeURIComponent(escape(atob(b64))); return JSON.parse(json); } catch { return null; }
}
function buildShareUrl(channel) {
const base = window.location.origin + window.location.pathname;
return `${base}#p=${encodeObj(channel)}`;
}
function buildWhatsAppMessage(ch) {
const lines = [`📋 *${ch.name}*`, ''];
INFO_FIELDS.forEach(f => { const val = ch[f.key]; if(val) lines.push(`${f.emoji} *${f.label}:* ${val}`); });
if(ch.clientMobile) lines.push(`📱 *Client mobile:* ${ch.clientMobile}`);
if(ch.startDate) lines.push(`📅 *Start date:* ${formatDate(ch.startDate)}`);
lines.push('');
lines.push('🔗 *Project info:* ' + buildShareUrl(ch));
if(ch.surveyLink) lines.push('🔍 *Quick Survey:* ' + ch.surveyLink);
return lines.join('\n');
}

// Mention slug from a channel name
function slugify(name){ return name.toLowerCase().replace(/[^\w]+/g,'-').replace(/^-|-$/g,''); }

// Render text with #mentions converted to clickable spans
function renderWithMentions(text, channels, onMentionClick) {
if(!text) return null;
const parts = text.split(/(#[\w-]+)/g);
return parts.map((part, i) => {
if(part.startsWith('#')) {
const slug = part.slice(1).toLowerCase();
const ch = channels.find(c => slugify(c.name) === slug);
if(ch) {
return <a key={i} className="mention" onClick={(e) => { e.preventDefault(); onMentionClick(ch.id); }}>{part}</a>;
}
}
return part;
});
}

// ── MENTION DROPDOWN HOOK ───────────────────────────────────────────────────
function useMentions(text, setText, allChannels, currentChannelId) {
const [open, setOpen] = useState(false);
const [query, setQuery] = useState('');
const [pos, setPos] = useState(0); // start index of #
const [activeIdx, setActiveIdx] = useState(0);

const matches = useMemo(() => {
if(!open) return [];
const q = query.toLowerCase();
return allChannels
.filter(c => c.id !== currentChannelId)
.filter(c => slugify(c.name).includes(q) || c.name.toLowerCase().includes(q))
.slice(0, 8);
}, [open, query, allChannels, currentChannelId]);

useEffect(() => { setActiveIdx(0); }, [query]);

const handleChange = (e, ref) => {
const v = e.target.value;
setText(v);
const cursor = e.target.selectionStart;
// Find last '#' before cursor with no space after it
const before = v.slice(0, cursor);
const m = before.match(/#([\w-]*)$/);
if(m) {
setOpen(true);
setQuery(m[1]);
setPos(cursor - m[0].length);
} else {
setOpen(false);
}
};

const insert = (channel, ref) => {
const slug = slugify(channel.name);
const before = text.slice(0, pos);
const after = text.slice(pos + 1 + query.length);
const newText = before + '#' + slug + ' ' + after;
setText(newText);
setOpen(false);
setTimeout(() => {
if(ref?.current) {
const newCursor = (before + '#' + slug + ' ').length;
ref.current.focus();
ref.current.setSelectionRange(newCursor, newCursor);
}
}, 0);
};

const handleKeyDown = (e, ref) => {
if(!open || matches.length === 0) return false;
if(e.key === 'ArrowDown'){ e.preventDefault(); setActiveIdx(i => (i+1) % matches.length); return true; }
if(e.key === 'ArrowUp'){ e.preventDefault(); setActiveIdx(i => (i-1+matches.length) % matches.length); return true; }
if(e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); insert(matches[activeIdx], ref); return true; }
if(e.key === 'Escape'){ e.preventDefault(); setOpen(false); return true; }
return false;
};

return {open, matches, activeIdx, setActiveIdx, insert, handleChange, handleKeyDown, close:()=>setOpen(false)};
}

// ── CALENDAR VIEW ───────────────────────────────────────────────────────────
function CalendarView({entries, jobChannels, onAddEntry, onDeleteEntry, onJumpToProject}) {
const [cursor, setCursor] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
const [pickedDate, setPickedDate] = useState(null);

const year = cursor.getFullYear();
const month = cursor.getMonth();
const monthLabel = cursor.toLocaleDateString('en-NZ', {month:'long', year:'numeric'});
const firstDay = new Date(year, month, 1);
const startOffset = firstDay.getDay();
const daysInMonth = new Date(year, month+1, 0).getDate();
const daysInPrev = new Date(year, month, 0).getDate();
const today = todayISO();

const cells = [];
for(let i = 0; i < startOffset; i++) {
const day = daysInPrev - startOffset + 1 + i;
cells.push({day, other:true, date: new Date(year, month-1, day).toISOString().slice(0,10)});
}
for(let i = 1; i <= daysInMonth; i++) {
cells.push({day:i, other:false, date: new Date(year, month, i).toISOString().slice(0,10)});
}
while(cells.length % 7 !== 0) {
const day = cells.length - daysInMonth - startOffset + 1;
cells.push({day, other:true, date: new Date(year, month+1, day).toISOString().slice(0,10)});
}

const entriesByDate = entries.reduce((acc, e) => {
(acc[e.date] = acc[e.date] || []).push(e);
return acc;
}, {});

return (
<div>
<div style={s.calNav}>
<button style={s.calNavBtn} onClick={() => setCursor(new Date(year, month-1, 1))}>‹</button>
<div style={s.calMonth}>{monthLabel}</div>
<button style={s.calNavBtn} onClick={() => setCursor(new Date(year, month+1, 1))}>›</button>
</div>
<div style={s.calGrid}>
{['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} style={s.calHeadCell}>{d}</div>)}
{cells.map((c, i) => {
const dayEntries = entriesByDate[c.date] || [];
return (
<div key={i}
style={{
...s.calCell,
...(c.date === today ? s.calCellToday : {}),
...(c.other ? s.calCellOther : {})
}}
onClick={() => setPickedDate(c.date)}>
<div style={s.calDay}>{c.day}</div>
{dayEntries.slice(0,3).map(e => (
<div key={e.id} style={s.calEntry}
onClick={(ev) => { ev.stopPropagation(); if(e.projectId) onJumpToProject(e.projectId); }}
title={e.text}>
{e.projectName ? '◆ ' + e.projectName : e.text.slice(0,20)}
</div>
))}
{dayEntries.length > 3 && (
<div style={{...s.calEntry, background:'var(--bg-sunken)',color:'var(--text-dim)'}}>+{dayEntries.length-3} more</div>
)}
</div>
);
})}
</div>

{pickedDate && (
<div style={{marginTop:20,background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:10,padding:'18px 20px'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
<div style={{fontWeight:700,color:'var(--text)'}}>{formatDate(pickedDate)}</div>
<div style={{display:'flex',gap:8}}>
<button style={s.cancelBtn} onClick={() => setPickedDate(null)}>Close</button>
<button style={s.primaryBtn} onClick={() => onAddEntry(pickedDate)}>+ Entry</button>
</div>
</div>
{(entriesByDate[pickedDate] || []).length === 0
? <div style={{fontSize:12,color:'var(--text-dim)',padding:'10px 0'}}>No entries yet for this day.</div>
: (entriesByDate[pickedDate] || []).map(e => (
<div key={e.id} style={{padding:'10px 12px',background:'var(--bg-raised)',borderRadius:6,marginBottom:6,display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start'}}>
<div style={{flex:1}}>
{e.projectName && <div style={{fontSize:11,color:'var(--accent-text)',fontWeight:600,marginBottom:3,cursor:'pointer'}}
onClick={() => onJumpToProject(e.projectId)}>◆ {e.projectName}</div>}
<div style={{fontSize:13,color:'var(--text)'}}>{e.text}</div>
</div>
<button onClick={() => onDeleteEntry(e.id)} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:14}}>×</button>
</div>
))
}
</div>
)}
</div>
);
}

// ── NOTES FEED (with mentions) ──────────────────────────────────────────────
function NotesFeed({channelId, threadId, notes, setNotes, placeholder, allChannels, onMentionClick, getCategory}) {
const [text, setText] = useState('');
const inputRef = useRef(null);
const mentions = useMentions(text, setText, allChannels, channelId);
const feed = (notes[channelId]?.[threadId] || []).slice().reverse();

const addNote = () => {
if(!text.trim()) return;
setNotes(prev => ({
...prev,
[channelId]: {
...(prev[channelId] || {}),
[threadId]: [...(prev[channelId]?.[threadId] || []), {
id: Date.now().toString(), text: text.trim(), createdAt: new Date().toISOString()
}]
}
}));
setText('');
mentions.close();
};

const deleteNote = (noteId) => {
setNotes(prev => ({
...prev,
[channelId]: {
...(prev[channelId] || {}),
[threadId]: (prev[channelId]?.[threadId] || []).filter(n => n.id !== noteId)
}
}));
};

return (
<div style={{height:'100%',display:'flex',flexDirection:'column'}}>
<div style={{flex:1,overflowY:'auto',paddingBottom:16}}>
{feed.length === 0
? <div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>📝</span><span style={s.emptyText}>No entries yet</span></div>
: feed.map(n => (
<div key={n.id} style={s.note}>
<div style={s.noteText}>{renderWithMentions(n.text, allChannels, onMentionClick)}</div>
<div style={{...s.noteMeta,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span>{formatTime(n.createdAt)}</span>
<button onClick={() => deleteNote(n.id)} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:14,padding:'0 4px'}}>×</button>
</div>
</div>
))
}
</div>
<div style={{paddingTop:12,borderTop:'1px solid var(--border)'}}>
<div style={s.noteInputWrap}>
<MentionDropdown mentions={mentions} inputRef={inputRef} getCategory={getCategory}/>
<textarea ref={inputRef}
style={s.noteInput} value={text}
onChange={(e) => mentions.handleChange(e, inputRef)}
placeholder={placeholder || 'Add a note... (type # to mention a channel)'}
rows={3}
onKeyDown={(e) => {
const handled = mentions.handleKeyDown(e, inputRef);
if(!handled && e.key==='Enter' && e.metaKey) addNote();
}}/>
</div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span style={{fontSize:10,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',letterSpacing:0.14}}>⌘ + Enter to send · # to mention</span>
<button style={s.sendBtn} onClick={addNote}>Add entry</button>
</div>
</div>
</div>
);
}

// ── THREAD VIEW ─────────────────────────────────────────────────────────────
function ThreadView({channel, thread, notes, setNotes, allChannels, incidents, onIncidentSubmit, onIncidentDelete, onMentionClick, onJumpToProject, onUpdateMaterials, onAddMaterial, calendarEntries, onAddCalEntry, onDeleteCalEntry, getCategory}) {
const jobChannels = allChannels.filter(c => c.type === 'job');

if(channel.type === 'plain') {
return <NotesFeed channelId={channel.id} threadId="main" notes={notes} setNotes={setNotes}
placeholder={`Post in #${channel.name}... (type # to mention)`}
allChannels={allChannels} onMentionClick={onMentionClick} getCategory={getCategory}/>;
}

if(channel.type === 'materials') {
return <MaterialsView channel={channel} onUpdate={onUpdateMaterials} onAdd={onAddMaterial}/>;
}

if(channel.type === 'calendar') {
return <CalendarView entries={calendarEntries} jobChannels={jobChannels}
onAddEntry={onAddCalEntry} onDeleteEntry={onDeleteCalEntry} onJumpToProject={onJumpToProject}/>;
}

if(channel.type === 'incidents-bin') {
return <IncidentsBinView incidentType={channel.incidentType} incidents={incidents}
allChannels={allChannels} onMentionClick={onMentionClick} onJumpToProject={onJumpToProject}/>;
}

// Job channel threads
if(thread.id === 'info') return <InfoDisplay channel={channel}/>;

if(thread.id === 'incidents') {
return <ProjectIncidentsView channel={channel} incidents={incidents}
allChannels={allChannels} onMentionClick={onMentionClick}
onAdd={onIncidentSubmit} onDelete={onIncidentDelete}/>;
}

if(thread.id === 'rams') {
return (
<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
<div style={{fontSize:40,opacity:0.7}}>📋</div>
<div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>RAMS Form</div>
<div style={{fontSize:12,color:'var(--text-dim)',textAlign:'center',maxWidth:320,lineHeight:1.5}}>Opens the RAMS form in a new tab.</div>
<a href={RAMS_URL} target="_blank" rel="noreferrer"
style={{...s.infoLinkBtn,background:'var(--accent)',color:'#fff',borderColor:'var(--accent)',marginTop:4}}>Open RAMS form →</a>
</div>
);
}

if(thread.id === 'survey') {
return (
<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
<div style={{fontSize:40,opacity:0.7}}>🔍</div>
<div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>Quick Survey</div>
{channel.surveyLink
? <a href={channel.surveyLink} target="_blank" rel="noreferrer"
style={{...s.infoLinkBtn,background:'var(--accent)',color:'#fff',borderColor:'var(--accent)',marginTop:4}}>Open Quick Survey →</a>
: <div style={{fontSize:12,color:'var(--text-dim)'}}>No Quick Survey link set.</div>}
</div>
);
}

if(thread.id === 'timesheet') {
return (
<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
<div style={{fontSize:40,opacity:0.7}}>⏱️</div>
<div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>Timesheet</div>
<div style={{fontSize:12,color:'var(--text-dim)'}}>Coming soon — editable timesheet for team leaders.</div>
</div>
);
}

return <NotesFeed channelId={channel.id} threadId={thread.id} notes={notes} setNotes={setNotes}
placeholder={`Add a ${thread.label} note... (type # to mention)`}
allChannels={allChannels} onMentionClick={onMentionClick} getCategory={getCategory}/>;
}

// ── SIDEBAR CATEGORY ────────────────────────────────────────────────────────
function CategoryBlock({category, channels, activeId, onSelect, onAddChannel, onEditCategory}) {
const [open, setOpen] = useState(!category.collapsed);
return (
<div style={s.catWrap}>
<div style={s.catHeader}>
<span onClick={() => setOpen(o => !o)} style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0}}>
<span style={{...s.catCaret, transform: open?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
<span style={s.catEmoji}>{category.emoji}</span>
<span style={s.catLabel}>{category.name}</span>
</span>
<span style={s.catCount}>{channels.length}</span>
{category.system !== 'incidents' && (
<button style={s.catAddBtn} title="New channel" onClick={(e) => { e.stopPropagation(); onAddChannel(category); }}>+</button>
)}
{!category.system && (
<button style={s.catAddBtn} title="Edit category" onClick={(e) => { e.stopPropagation(); onEditCategory(category); }}>✎</button>
)}
</div>
{open && channels.map(ch => {
const isActive = activeId === ch.id;
const isDone = ch.status === 'done';
let hash = '#';
if(ch.type === 'job') hash = '◆';
else if(ch.type === 'materials') hash = '🧰';
else if(ch.type === 'calendar') hash = '📅';
else if(ch.type === 'incidents-bin') {
const t = INCIDENT_TYPES.find(t => t.id === ch.incidentType);
hash = t?.emoji || '⚠️';
}
return (
<div key={ch.id}
style={{...s.chanItem, ...(isActive ? s.chanItemActive : {}), ...(isDone ? s.chanItemDone : {})}}
onClick={() => onSelect(ch.id)}>
<span style={s.chanHash}>{hash}</span>
<span style={{...s.chanName, ...(isActive ? s.chanNameActive : {})}}>{ch.name}</span>
</div>
);
})}
{open && channels.length === 0 && <div style={s.emptyCat}>no channels yet</div>}
</div>
);
}

// ── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
const [theme, setTheme] = useTheme();
const [data, setData] = useStorage('ral-data-v4', null);
const [notes, setNotes] = useStorage('ral-notes', {});
const [incidents, setIncidents] = useStorage('ral-incidents', []);
const [calendarEntries, setCalendarEntries] = useStorage('ral-calendar', []);
const [activeId, setActiveId] = useState(null);
const [activeThreadId, setActiveThreadId] = useState('info');
const [showJobWizard, setShowJobWizard] = useState(false);
const [editingJob, setEditingJob] = useState(null);
const [jobTargetCategory, setJobTargetCategory] = useState('cat-run');
const [showShare, setShowShare] = useState(false);
const [showCategoryModal, setShowCategoryModal] = useState(false);
const [editingCategory, setEditingCategory] = useState(null);
const [showTypePicker, setShowTypePicker] = useState(null);
const [showAddThread, setShowAddThread] = useState(false);
const [showIncidentForm, setShowIncidentForm] = useState(false);
const [showAddMaterial, setShowAddMaterial] = useState(false);
const [calEntryDate, setCalEntryDate] = useState(null);
const [sharedChannel, setSharedChannel] = useState(null);

useEffect(() => { if(data === null) setData(seedData()); }, [data]);

useEffect(() => {
const checkHash = () => {
const hash = window.location.hash;
if(hash.startsWith('#p=')) {
const decoded = decodeObj(hash.slice(3));
if(decoded) setSharedChannel(decoded);
} else {
setSharedChannel(null);
}
};
checkHash();
window.addEventListener('hashchange', checkHash);
return () => window.removeEventListener('hashchange', checkHash);
}, []);

if(sharedChannel) {
return <SharedView channel={sharedChannel} onExit={() => { window.location.hash = ''; setSharedChannel(null); }}/>;
}

const d = data || {categories:[],channels:[]};
const channel = d.channels.find(c => c.id === activeId);
const getCategory = (id) => d.categories.find(c => c.id === id);
const updateData = (fn) => setData(prev => fn(prev || {categories:[],channels:[]}));

const saveJob = (job) => {
updateData(prev => {
const idx = prev.channels.findIndex(c => c.id === job.id);
const targetCategoryId = editingJob ? job.categoryId : jobTargetCategory;
const finalJob = {...job, categoryId: targetCategoryId};
if(idx >= 0) { const channels = [...prev.channels]; channels[idx] = finalJob; return {...prev, channels}; }
return {...prev, channels: [finalJob, ...prev.channels]};
});
setActiveId(job.id);
setActiveThreadId('info');
};

const createPlainChannel = (categoryId, name) => {
const ch = {id:'ch-'+Date.now().toString(36), type:'plain', name, categoryId, createdAt:new Date().toISOString()};
updateData(prev => ({...prev, channels: [ch, ...prev.channels]}));
setActiveId(ch.id); setShowTypePicker(null);
};
const createMaterialsChannel = (categoryId, name) => {
const ch = {id:'ch-'+Date.now().toString(36), type:'materials', name, categoryId, materials:[], createdAt:new Date().toISOString()};
updateData(prev => ({...prev, channels: [ch, ...prev.channels]}));
setActiveId(ch.id); setShowTypePicker(null);
};
const createCalendarChannel = (categoryId, name) => {
const ch = {id:'ch-'+Date.now().toString(36), type:'calendar', name, categoryId, createdAt:new Date().toISOString()};
updateData(prev => ({...prev, channels: [ch, ...prev.channels]}));
setActiveId(ch.id); setShowTypePicker(null);
};

const deleteChannel = (id) => {
const ch = d.channels.find(c => c.id === id);
if(ch?.type === 'incidents-bin') return alert('System channels cannot be deleted.');
if(!confirm('Delete this channel?')) return;
updateData(prev => ({...prev, channels: prev.channels.filter(c => c.id !== id)}));
if(activeId === id) setActiveId(null);
};

const toggleStatus = (id) => {
updateData(prev => ({
...prev,
channels: prev.channels.map(c => {
if(c.id !== id) return c;
const newStatus = c.status === 'done' ? 'running' : 'done';
const runCat = prev.categories.find(cat => cat.system === 'running');
const doneCat = prev.categories.find(cat => cat.system === 'done');
let newCatId = c.categoryId;
if(newStatus === 'done' && c.categoryId === runCat?.id) newCatId = doneCat?.id || c.categoryId;
if(newStatus === 'running' && c.categoryId === doneCat?.id) newCatId = runCat?.id || c.categoryId;
return {...c, status: newStatus, categoryId: newCatId};
})
}));
};

const saveCategory = (cat) => {
updateData(prev => {
const idx = prev.categories.findIndex(c => c.id === cat.id);
if(idx >= 0) { const categories = [...prev.categories]; categories[idx] = cat; return {...prev, categories}; }
return {...prev, categories: [...prev.categories, cat]};
});
};

const addCustomThread = (thread) => {
if(!channel || channel.type !== 'job') return;
updateData(prev => ({...prev, channels: prev.channels.map(c => c.id === channel.id ? {...c, customThreads:[...(c.customThreads || []), thread]} : c)}));
setActiveThreadId(thread.id);
};
const removeCustomThread = (threadId) => {
if(!channel || channel.type !== 'job') return;
if(!confirm('Remove this thread? Notes in it will be lost.')) return;
updateData(prev => ({...prev, channels: prev.channels.map(c => c.id === channel.id ? {...c, customThreads:(c.customThreads || []).filter(t=>t.id!==threadId)} : c)}));
if(activeThreadId === threadId) setActiveThreadId('info');
};

const submitIncident = (inc) => { setIncidents(prev => [inc, ...prev]); };
const deleteIncident = (id) => { if(confirm('Delete this report?')) setIncidents(prev => prev.filter(i => i.id !== id)); };

const updateMaterials = (newList) => {
if(!channel) return;
updateData(prev => ({...prev, channels: prev.channels.map(c => c.id === channel.id ? {...c, materials:newList} : c)}));
};
const addMaterial = (item) => {
if(!channel) return;
updateData(prev => ({...prev, channels: prev.channels.map(c => c.id === channel.id ? {...c, materials:[...(c.materials || []), item]} : c)}));
};

const addCalEntry = (entry) => { setCalendarEntries(prev => [entry, ...prev]); setCalEntryDate(null); };
const deleteCalEntry = (id) => setCalendarEntries(prev => prev.filter(e => e.id !== id));

const selectChannel = (id) => { setActiveId(id); setActiveThreadId('info'); };

const handleMentionClick = (id) => { selectChannel(id); };

// Thread list — custom threads shown FIRST, then defaults
const allThreads = channel && channel.type === 'job'
? [...(channel.customThreads || []), ...DEFAULT_THREADS]
: [];
const currentThread = allThreads.find(t => t.id === activeThreadId) || allThreads[0];

const channelsByCat = (catId) => d.channels.filter(c => c.categoryId === catId);
const currentCategory = channel ? d.categories.find(c => c.id === channel.categoryId) : null;

return (
<div style={s.app}>
<div style={s.sidebar}>
<div style={s.serverHeader}>
<div style={s.serverIcon}>RAL</div>
<div style={s.serverMeta}>
<div style={s.serverSmallCap}>Server</div>
<div style={s.serverName}>RAL</div>
</div>
<button style={s.themeToggle} onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} title="Toggle theme">
{theme === 'light' ? '🌙' : '☀️'}
</button>
</div>

<div style={s.actionBar}>
<button style={s.actionBtn} onClick={() => { setEditingJob(null); setJobTargetCategory('cat-run'); setShowJobWizard(true); }}>+ NEW PROJECT</button>
<button style={s.actionBtn} onClick={() => { setEditingCategory(null); setShowCategoryModal(true); }}>+ CATEGORY</button>
</div>

<div style={s.projList}>
{d.categories.map(cat => (
<CategoryBlock key={cat.id} category={cat} channels={channelsByCat(cat.id)}
activeId={activeId} onSelect={selectChannel}
onAddChannel={(c) => {
if(c.system === 'running') { setEditingJob(null); setJobTargetCategory(c.id); setShowJobWizard(true); }
else { setShowTypePicker({category: c}); }
}}
onEditCategory={(c) => { setEditingCategory(c); setShowCategoryModal(true); }}/>
))}
</div>
</div>

<div style={s.main}>
{!channel
? <div style={{...s.empty,height:'100%'}}>
<span style={s.emptyIcon}>🏗️</span>
<span style={s.emptyText}>Select or create a channel</span>
<button style={s.primaryBtn} onClick={() => { setEditingJob(null); setJobTargetCategory('cat-run'); setShowJobWizard(true); }}>+ New project</button>
</div>
: <>
<div style={s.header}>
<div style={s.headerTitleWrap}>
<div style={s.headerKicker}>
{currentCategory ? `${currentCategory.emoji} ${currentCategory.name}` : ''}
{channel.status === 'done' && ' · done'}
</div>
<div style={s.headerTitle}>
{(channel.type === 'plain' || channel.type === 'materials' || channel.type === 'calendar' || channel.type === 'incidents-bin') ? '#' + channel.name : channel.name}
</div>
<div style={s.headerMeta}>
{channel.type === 'job' ? `${channel.address || 'No address'} · Started ${formatDate(channel.startDate)}` :
channel.type === 'materials' ? 'Materials list' :
channel.type === 'calendar' ? 'Calendar' :
channel.type === 'incidents-bin' ? 'All ' + channel.name + ' reports across projects' :
'Plain channel'
}
</div>
</div>
<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
{channel.type === 'job' && channel.whatsapp && (
<a href={channel.whatsapp} target="_blank" rel="noreferrer"
style={{...s.badge,...s.badgeSuccess,textDecoration:'none'}}>💬 Chat</a>
)}
{channel.type === 'job' && (
<>
<button style={{...s.badge,...s.badgePrimary}} onClick={() => setShowShare(true)}>↗ Share</button>
<button style={{...s.badge,...s.badgeGhost}} onClick={() => toggleStatus(channel.id)}>
{channel.status === 'done' ? '↻ Re-open' : '✓ Done'}
</button>
<button style={{...s.badge,...s.badgeGhost}} onClick={() => { setEditingJob(channel); setShowJobWizard(true); }}>✏ Edit</button>
</>
)}
{channel.type !== 'incidents-bin' && (
<button style={{...s.badge,...s.badgeGhost}} onClick={() => deleteChannel(channel.id)}>🗑</button>
)}
</div>
</div>

{channel.type === 'job' && (
<div style={s.threadBar}>
<button style={s.threadAdd} onClick={() => setShowAddThread(true)} title="Add custom thread">+</button>
{(channel.customThreads || []).length > 0 && <div style={s.threadDivider}/>}
{allThreads.map(t => (
<button key={t.id}
style={{...s.threadBtn, ...(activeThreadId===t.id ? s.threadBtnActive : {})}}
onClick={() => setActiveThreadId(t.id)}>
<span>{t.icon}</span>
<span>{t.label}</span>
{!t.fixed && activeThreadId===t.id && (
<span style={s.threadRemove} onClick={(e) => { e.stopPropagation(); removeCustomThread(t.id); }}>×</span>
)}
</button>
))}
</div>
)}

<div style={s.content}>
<ThreadView
channel={channel} thread={currentThread}
notes={notes} setNotes={setNotes}
allChannels={d.channels} incidents={incidents}
onIncidentSubmit={() => setShowIncidentForm(true)}
onIncidentDelete={deleteIncident}
onMentionClick={handleMentionClick}
onJumpToProject={selectChannel}
onUpdateMaterials={updateMaterials}
onAddMaterial={() => setShowAddMaterial(true)}
calendarEntries={calendarEntries}
onAddCalEntry={(date) => setCalEntryDate(date)}
onDeleteCalEntry={deleteCalEntry}
getCategory={getCategory}
/>
</div>
</>
}
</div>

{showJobWizard && (
<JobWizard onClose={() => setShowJobWizard(false)} onSave={saveJob} editing={editingJob}/>
)}
{showShare && channel && channel.type === 'job' && (
<ShareModal channel={channel} onClose={() => setShowShare(false)}/>
)}
{showCategoryModal && (
<CategoryModal onClose={() => { setShowCategoryModal(false); setEditingCategory(null); }} onSave={saveCategory} editing={editingCategory}/>
)}
{showTypePicker && (
<ChannelTypePicker
onClose={() => setShowTypePicker(null)}
categoryName={showTypePicker.category.name}
onPickJob={() => { setJobTargetCategory(showTypePicker.category.id); setEditingJob(null); setShowTypePicker(null); setShowJobWizard(true); }}
onPickPlain={(name) => createPlainChannel(showTypePicker.category.id, name)}
onPickMaterials={(name) => createMaterialsChannel(showTypePicker.category.id, name)}
onPickCalendar={(name) => createCalendarChannel(showTypePicker.category.id, name)}
/>
)}
{showAddThread && <AddThreadModal onClose={() => setShowAddThread(false)} onSave={addCustomThread}/>}
{showIncidentForm && channel && channel.type === 'job' && (
<IncidentFormModal onClose={() => setShowIncidentForm(false)} onSave={submitIncident} project={channel}/>
)}
{showAddMaterial && <AddMaterialModal onClose={() => setShowAddMaterial(false)} onSave={addMaterial}/>}
{calEntryDate && (
<CalendarEntryModal onClose={() => setCalEntryDate(null)} onSave={addCalEntry}
date={calEntryDate} jobChannels={d.channels.filter(c => c.type === 'job')}/>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
