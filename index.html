// ── HOOKS ───────────────────────────────────────────────────────────────────
function useStorage(key, init) {
const [val, setVal] = useState(() => {
try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; }
});
useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
return [val, setVal];
}

function useTheme() {
const [theme, setTheme] = useState(() => {
try { return localStorage.getItem('ral-theme') || 'light'; } catch { return 'light'; }
});
useEffect(() => {
document.documentElement.setAttribute('data-theme', theme);
try { localStorage.setItem('ral-theme', theme); } catch {}
}, [theme]);
return [theme, setTheme];
}

function formatDate(iso) {
if(!iso) return '—';
return new Date(iso).toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric'});
}

function formatTime(iso) {
if(!iso) return '';
return new Date(iso).toLocaleString('en-NZ', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── ENCODE/DECODE ───────────────────────────────────────────────────────────
function encodeObj(p) {
try {
const json = JSON.stringify(p);
const b64 = btoa(unescape(encodeURIComponent(json)));
return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
} catch { return ''; }
}

function decodeObj(str) {
try {
let b64 = str.replace(/-/g,'+').replace(/_/g,'/');
while(b64.length % 4) b64 += '=';
const json = decodeURIComponent(escape(atob(b64)));
return JSON.parse(json);
} catch { return null; }
}

function buildShareUrl(channel) {
const base = window.location.origin + window.location.pathname;
return `${base}#p=${encodeObj(channel)}`;
}

function buildWhatsAppMessage(ch) {
const lines = [`📋 *${ch.name}*`, ''];
INFO_FIELDS.forEach(f => {
const val = ch[f.key];
if(val) lines.push(`${f.emoji} *${f.label}:* ${val}`);
});
if(ch.clientMobile) lines.push(`📱 *Client mobile:* ${ch.clientMobile}`);
if(ch.startDate) lines.push(`📅 *Start date:* ${formatDate(ch.startDate)}`);
lines.push('');
lines.push('🔗 *Project info:* ' + buildShareUrl(ch));
if(ch.surveyLink) lines.push('🔍 *Quick Survey:* ' + ch.surveyLink);
return lines.join('\n');
}

// ── NOTES FEED ──────────────────────────────────────────────────────────────
function NotesFeed({channelId, threadId, notes, setNotes, placeholder}) {
const [text, setText] = useState('');
const feed = (notes[channelId]?.[threadId] || []).slice().reverse();

const addNote = () => {
if(!text.trim()) return;
setNotes(prev => ({
...prev,
[channelId]: {
...(prev[channelId] || {}),
[threadId]: [...(prev[channelId]?.[threadId] || []), {
id: Date.now().toString(),
text: text.trim(),
createdAt: new Date().toISOString()
}]
}
}));
setText('');
};

const deleteNote = (noteId) => {
setNotes(prev => ({
...prev,
[channelId]: {
...(prev[channelId] || {}),
[threadId]: (prev[channelId]?.[threadId] || []).filter(n => n.id !== noteId)
}
}));
};

return (
<div style={{height:'100%',display:'flex',flexDirection:'column'}}>
<div style={{flex:1,overflowY:'auto',paddingBottom:16}}>
{feed.length === 0
? <div style={{...s.empty,height:'60%'}}>
<span style={s.emptyIcon}>📝</span>
<span style={s.emptyText}>No entries yet</span>
</div>
: feed.map(n => (
<div key={n.id} style={s.note}>
<div style={s.noteText}>{n.text}</div>
<div style={{...s.noteMeta,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span>{formatTime(n.createdAt)}</span>
<button onClick={() => deleteNote(n.id)} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:14,padding:'0 4px'}}>×</button>
</div>
</div>
))
}
</div>
<div style={{paddingTop:12,borderTop:'1px solid var(--border)'}}>
<textarea
style={s.noteInput}
value={text}
onChange={e => setText(e.target.value)}
placeholder={placeholder || 'Add a note...'}
rows={3}
onKeyDown={e => { if(e.key==='Enter' && e.metaKey) addNote(); }}
/>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span style={{fontSize:10,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace",textTransform:'uppercase',letterSpacing:0.14}}>⌘ + Enter to send</span>
<button style={s.sendBtn} onClick={addNote}>Add entry</button>
</div>
</div>
</div>
);
}

const [sharedChannel, setSharedChannel] = useState(null);

useEffect(() => {
if(data === null) setData(seedData());
}, [data]);

useEffect(() => {
const checkHash = () => {
const hash = window.location.hash;
if(hash.startsWith('#p=')) {
const decoded = decodeObj(hash.slice(3));
if(decoded) setSharedChannel(decoded);
} else {
setSharedChannel(null);
}
};
checkHash();
window.addEventListener('hashchange', checkHash);
return () => window.removeEventListener('hashchange', checkHash);
}, []);

if(sharedChannel) {
return <SharedView channel={sharedChannel} onExit={() => {
window.location.hash = '';
setSharedChannel(null);
}}/>;
}

const d = data || {categories:[],channels:[]};
const channel = d.channels.find(c => c.id === activeId);

const updateData = (fn) => setData(prev => fn(prev || {categories:[],channels:[]}));

const saveJob = (job) => {
updateData(prev => {
const idx = prev.channels.findIndex(c => c.id === job.id);
const targetCategoryId = editingJob ? job.categoryId : jobTargetCategory;
const finalJob = {...job, categoryId: targetCategoryId};
if(idx >= 0) {
const channels = [...prev.channels];
channels[idx] = finalJob;
return {...prev, channels};
}
return {...prev, channels: [finalJob, ...prev.channels]};
});
setActiveId(job.id);
setActiveThreadId('info');
};

const createPlainChannel = (categoryId, name) => {
const ch = {
id: 'ch-' + Date.now().toString(36),
type: 'plain',
name,
categoryId,
createdAt: new Date().toISOString()
};
updateData(prev => ({...prev, channels: [ch, ...prev.channels]}));
setActiveId(ch.id);
setShowTypePicker(null);
};

const deleteChannel = (id) => {
if(!confirm('Delete this channel?')) return;
updateData(prev => ({...prev, channels: prev.channels.filter(c => c.id !== id)}));
if(activeId === id) setActiveId(null);
};

const toggleStatus = (id) => {
updateData(prev => ({
...prev,
channels: prev.channels.map(c => {
if(c.id !== id) return c;
const newStatus = c.status === 'done' ? 'running' : 'done';
const runCat = prev.categories.find(cat => cat.system === 'running');
const doneCat = prev.categories.find(cat => cat.system === 'done');
let newCatId = c.categoryId;
if(newStatus === 'done' && c.categoryId === runCat?.id) newCatId = doneCat?.id || c.categoryId;
if(newStatus === 'running' && c.categoryId === doneCat?.id) newCatId = runCat?.id || c.categoryId;
return {...c, status: newStatus, categoryId: newCatId};
})
}));
};

const saveCategory = (cat) => {
updateData(prev => {
const idx = prev.categories.findIndex(c => c.id === cat.id);
if(idx >= 0) {
const categories = [...prev.categories];
categories[idx] = cat;
return {...prev, categories};
}
return {...prev, categories: [...prev.categories, cat]};
});
};

const addCustomThread = (thread) => {
if(!channel || channel.type !== 'job') return;
updateData(prev => ({
...prev,
channels: prev.channels.map(c =>
c.id === channel.id ? {...c, customThreads: [...(c.customThreads || []), thread]} : c
)
}));
setActiveThreadId(thread.id);
};

const removeCustomThread = (threadId) => {
if(!channel || channel.type !== 'job') return;
if(!confirm('Remove this thread? Notes in it will be lost.')) return;
updateData(prev => ({
...prev,
channels: prev.channels.map(c =>
c.id === channel.id ? {...c, customThreads: (c.customThreads || []).filter(t => t.id !== threadId)} : c
)
}));
if(activeThreadId === threadId) setActiveThreadId('info');
};

const selectChannel = (id) => {
setActiveId(id);
setActiveThreadId('info');
};

const allThreads = channel && channel.type === 'job'
? [...DEFAULT_THREADS, ...(channel.customThreads || [])]
: [];
const currentThread = allThreads.find(t => t.id === activeThreadId) || allThreads[0];

const channelsByCat = (catId) => d.channels.filter(c => c.categoryId === catId);
const currentCategory = channel ? d.categories.find(c => c.id === channel.categoryId) : null;

return (
<div style={s.app}>
{/* SIDEBAR */}
<div style={s.sidebar}>
<div style={s.serverHeader}>
<div style={s.serverIcon}>RAL</div>
<div style={s.serverMeta}>
<div style={s.serverSmallCap}>Server</div>
<div style={s.serverName}>RAL</div>
</div>
<button style={s.themeToggle} onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} title="Toggle theme">
{theme === 'light' ? '🌙' : '☀️'}
</button>
</div>

<div style={s.actionBar}>
<button style={s.actionBtn} onClick={() => { setEditingJob(null); setJobTargetCategory('cat-run'); setShowJobWizard(true); }}>
+ NEW PROJECT
</button>
<button style={s.actionBtn} onClick={() => { setEditingCategory(null); setShowCategoryModal(true); }}>
+ CATEGORY
</button>
</div>

<div style={s.projList}>
{d.categories.map(cat => (
<CategoryBlock
key={cat.id}
category={cat}
channels={channelsByCat(cat.id)}
activeId={activeId}
onSelect={selectChannel}
onAddChannel={(c) => {
if(c.system === 'running') {
setEditingJob(null);
setJobTargetCategory(c.id);
setShowJobWizard(true);
} else {
setShowTypePicker({category: c});
}
}}
onEditCategory={(c) => { setEditingCategory(c); setShowCategoryModal(true); }}
/>
))}
</div>
</div>

{/* MAIN */}
<div style={s.main}>
{!channel
? <div style={{...s.empty,height:'100%'}}>
<span style={s.emptyIcon}>🏗️</span>
<span style={s.emptyText}>Select or create a channel</span>
<button style={s.primaryBtn} onClick={() => { setEditingJob(null); setJobTargetCategory('cat-run'); setShowJobWizard(true); }}>+ New project</button>
</div>
: <>
<div style={s.header}>
<div style={s.headerTitleWrap}>
<div style={s.headerKicker}>
{currentCategory ? `${currentCategory.emoji} ${currentCategory.name}` : ''}
{channel.status === 'done' && ' · done'}
</div>
<div style={s.headerTitle}>
{channel.type === 'plain' ? '#' + channel.name : channel.name}
</div>
<div style={s.headerMeta}>
{channel.type === 'job'
? `${channel.address || 'No address'} · Started ${formatDate(channel.startDate)}`
: 'Plain channel'
}
</div>
</div>
<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
{channel.type === 'job' && channel.whatsapp && (
<a href={channel.whatsapp} target="_blank" rel="noreferrer"
style={{...s.badge,...s.badgeSuccess,textDecoration:'none'}}>
💬 Chat
</a>
)}
{channel.type === 'job' && (
<>
<button style={{...s.badge,...s.badgePrimary}} onClick={() => setShowShare(true)}>
↗ Share
</button>
<button style={{...s.badge,...s.badgeGhost}} onClick={() => toggleStatus(channel.id)}>
{channel.status === 'done' ? '↻ Re-open' : '✓ Done'}
</button>
<button style={{...s.badge,...s.badgeGhost}} onClick={() => { setEditingJob(channel); setShowJobWizard(true); }}>
✏ Edit
</button>
</>
)}
<button style={{...s.badge,...s.badgeGhost}} onClick={() => deleteChannel(channel.id)}>
🗑
</button>
</div>
</div>

{channel.type === 'job' && (
<div style={s.threadBar}>
{allThreads.map(t => (
<button key={t.id}
style={{...s.threadBtn, ...(activeThreadId===t.id ? s.threadBtnActive : {})}}
onClick={() => setActiveThreadId(t.id)}>
<span>{t.icon}</span>
<span>{t.label}</span>
{!t.fixed && activeThreadId===t.id && (
<span style={s.threadRemove} onClick={(e) => { e.stopPropagation(); removeCustomThread(t.id); }}>×</span>
)}
</button>
))}
<button style={s.threadAdd} onClick={() => setShowAddThread(true)} title="Add thread">
+
</button>
</div>
)}

<div style={s.content}>
<ThreadView
channel={channel}
thread={currentThread}
notes={notes}
setNotes={setNotes}
/>
</div>
</>
}
</div>

{showJobWizard && (
<JobWizard
onClose={() => setShowJobWizard(false)}
onSave={saveJob}
editing={editingJob}
/>
)}

{showShare && channel && channel.type === 'job' && (
<ShareModal channel={channel} onClose={() => setShowShare(false)}/>
)}

{showCategoryModal && (
<CategoryModal
onClose={() => { setShowCategoryModal(false); setEditingCategory(null); }}
onSave={saveCategory}
editing={editingCategory}
/>
)}

{showTypePicker && (
<ChannelTypePicker
onClose={() => setShowTypePicker(null)}
categoryName={showTypePicker.category.name}
onPickJob={() => {
setJobTargetCategory(showTypePicker.category.id);
setEditingJob(null);
setShowTypePicker(null);
setShowJobWizard(true);
}}
onPickPlain={(name) => createPlainChannel(showTypePicker.category.id, name)}
/>
)}

{showAddThread && (
<AddThreadModal
onClose={() => setShowAddThread(false)}
onSave={addCustomThread}
/>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
