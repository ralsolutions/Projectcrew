function useStorage(key,init){const[val,setVal]=useState(()=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):init;}catch{return init;}});useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);return[val,setVal];}
function useTheme(){const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('ral-theme')||'light';}catch{return'light';}});useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);try{localStorage.setItem('ral-theme',theme);}catch{}},[theme]);return[theme,setTheme];}
function formatDate(iso){if(!iso)return'—';return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'});}
function formatShortDate(iso){if(!iso)return'—';return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ',{day:'numeric',month:'short'});}
function formatWeekday(iso){if(!iso)return'—';return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short'});}
function formatTime(iso){if(!iso)return'';return new Date(iso).toLocaleString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
function todayISO(){return new Date().toISOString().slice(0,10);}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function datesFor(start,days){const arr=[];for(let i=0;i<days;i++)arr.push(addDays(start,i));return arr;}
function getWeekStart(iso){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10);}
function getWeekEnd(iso){return addDays(getWeekStart(iso),6);}
function calculateHours(start,end){if(!start||!end)return 0;const[sh,sm]=start.split(':').map(Number);const[eh,em]=end.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function encodeObj(p){try{return btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}catch{return'';}}
function decodeObj(str){try{let b64=str.replace(/-/g,'+').replace(/_/g,'/');while(b64.length%4)b64+='=';return JSON.parse(decodeURIComponent(escape(atob(b64))));}catch{return null;}}
function buildShareUrl(ch){return window.location.origin+window.location.pathname+'#p='+encodeObj(ch);}
function buildWhatsAppMessage(ch){const lines=['📋 *'+ch.name+'*',''];INFO_FIELDS.forEach(f=>{if(ch[f.key])lines.push(f.emoji+' *'+f.label+':* '+ch[f.key]);});if(ch.clientMobile)lines.push('📱 *Client mobile:* '+ch.clientMobile);if(ch.startDate)lines.push('📅 *Start date:* '+formatDate(ch.startDate));lines.push('','🔗 *Project info:* '+buildShareUrl(ch));if(ch.surveyLink)lines.push('🔍 *Quick Survey:* '+ch.surveyLink);return lines.join('\n');}
function slugify(name){return name.toLowerCase().replace(/[^\w]+/g,'-').replace(/^-|-$/g,'');}
function renderWithMentions(text,channels,onClick){if(!text)return null;return text.split(/(#[\w-]+)/g).map((p,i)=>{if(p.startsWith('#')){const ch=channels.find(c=>slugify(c.name)===p.slice(1).toLowerCase());if(ch)return <a key={i} className="mention" onClick={e=>{e.preventDefault();onClick(ch.id);}}>{p}</a>;}return p;});}

// Mentions
function useMentions(text,setText,channels,currentId){const[open,setOpen]=useState(false);const[query,setQuery]=useState('');const[pos,setPos]=useState(0);const[idx,setIdx]=useState(0);
const matches=useMemo(()=>open?channels.filter(c=>c.id!==currentId&&(slugify(c.name).includes(query.toLowerCase())||c.name.toLowerCase().includes(query.toLowerCase()))).slice(0,8):[],[open,query,channels,currentId]);
useEffect(()=>setIdx(0),[query]);
const handleChange=e=>{const v=e.target.value;setText(v);const cur=e.target.selectionStart,bef=v.slice(0,cur),m=bef.match(/#([\w-]*)$/);if(m){setOpen(true);setQuery(m[1]);setPos(cur-m[0].length);}else setOpen(false);};
const insert=(ch,ref)=>{const slug=slugify(ch.name),bef=text.slice(0,pos),aft=text.slice(pos+1+query.length),nt=bef+'#'+slug+' '+aft;setText(nt);setOpen(false);setTimeout(()=>{if(ref?.current){const nc=(bef+'#'+slug+' ').length;ref.current.focus();ref.current.setSelectionRange(nc,nc);}},0);};
const handleKeyDown=(e,ref)=>{if(!open||!matches.length)return false;if(e.key==='ArrowDown'){e.preventDefault();setIdx(i=>(i+1)%matches.length);return true;}if(e.key==='ArrowUp'){e.preventDefault();setIdx(i=>(i-1+matches.length)%matches.length);return true;}if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();insert(matches[idx],ref);return true;}if(e.key==='Escape'){e.preventDefault();setOpen(false);return true;}return false;};
return{open,matches,idx,setIdx,insert,handleChange,handleKeyDown,close:()=>setOpen(false)};}
function MentionDropdown({mentions,inputRef,getCategory,dropUp=true}){if(!mentions.open||!mentions.matches.length)return null;
const pos=dropUp?{bottom:'100%',marginBottom:6}:{top:'100%',marginTop:6};
return <div style={{...s.mentionDrop,...pos,left:0}}>{mentions.matches.map((c,i)=><div key={c.id} style={{...s.mentionItem,...(i===mentions.idx?s.mentionItemActive:{})}} onMouseEnter={()=>mentions.setIdx(i)} onClick={()=>mentions.insert(c,inputRef)}><span style={s.mentionItemHash}>{c.type==='job'?'◆':'#'}</span><span>{c.name}</span><span style={s.mentionItemMeta}>{getCategory(c.categoryId)?.name||''}</span></div>)}</div>;}

function ProjectIncidentsView({channel,incidents,channels,onClick,onAdd,onDelete}){const list=incidents.filter(i=>i.projectId===channel.id).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));return <div style={{height:'100%',display:'flex',flexDirection:'column'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}><div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase'}}>{list.length} reports</div></div><button style={s.primaryBtn} onClick={onAdd}>+ Report</button></div><div style={{flex:1,overflowY:'auto'}}>{list.length===0?<div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>✅</span><span style={s.emptyText}>No reports</span></div>:list.map(i=><IncidentCard key={i.id} incident={i} channels={channels} onClick={onClick} onDelete={onDelete}/>)}</div></div>;}

function IncidentsBinView({incidentType,incidents,channels,onClick,onJump}){const list=incidents.filter(i=>i.type===incidentType).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));const t=INCIDENT_TYPES.find(t=>t.id===incidentType);return <div style={{height:'100%',display:'flex',flexDirection:'column'}}><div style={{marginBottom:16}}><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase'}}>{list.length} {t.label} reports</div><div style={{fontSize:13,color:'var(--text-dim)'}}>Add from project → Incidents</div></div><div style={{flex:1,overflowY:'auto'}}>{list.length===0?<div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>{t.emoji}</span><span style={s.emptyText}>No {t.label}</span></div>:list.map(i=><div key={i.id} onClick={()=>i.projectId&&onJump(i.projectId)} style={{cursor:i.projectId?'pointer':'default'}}><IncidentCard incident={i} channels={channels} onClick={onClick} showJob/></div>)}</div></div>;}

function MaterialsView({channel,onUpdate,onAdd}){const items=channel.materials||[];const toggle=id=>onUpdate(items.map(m=>m.id===id?{...m,done:!m.done}:m));const remove=id=>onUpdate(items.filter(m=>m.id!==id));return <div style={{height:'100%',display:'flex',flexDirection:'column'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}><div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:'var(--text-dim)',textTransform:'uppercase'}}>{items.filter(m=>m.done).length}/{items.length} ready</div></div><button style={s.primaryBtn} onClick={onAdd}>+ Add</button></div><div style={{flex:1,overflowY:'auto'}}>{items.length===0?<div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>🧰</span><span style={s.emptyText}>No items</span></div>:items.map(m=><div key={m.id} style={s.matRow}><input type="checkbox" style={s.matCheck} checked={m.done} onChange={()=>toggle(m.id)}/><span style={{...s.matName,...(m.done?s.matNameDone:{})}}>{m.name}</span>{m.qty&&<span style={s.matQty}>{m.qty}</span>}<button onClick={()=>remove(m.id)} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:14}}>×</button></div>)}</div></div>;}

// Calendar View
function CalendarView({channel,entries,jobChannels,allChannels,getCategory,onSave,onDelete,onJump}){
const[viewDate,setViewDate]=useState(()=>new Date());
const[booking,setBooking]=useState(null);
const[selected,setSelected]=useState(null);
const[defaultDate,setDefaultDate]=useState(null);
const year=viewDate.getFullYear(),month=viewDate.getMonth();
const firstDay=new Date(year,month,1).getDay();
const daysInMonth=new Date(year,month+1,0).getDate();
const prevDays=new Date(year,month,0).getDate();
const today=todayISO();
const cells=[];
for(let i=0;i<firstDay;i++){const d=prevDays-firstDay+i+1;const iso=new Date(year,month-1,d).toISOString().slice(0,10);cells.push({day:d,iso,other:true});}
for(let d=1;d<=daysInMonth;d++){const iso=new Date(year,month,d).toISOString().slice(0,10);cells.push({day:d,iso,other:false,today:iso===today});}
const remaining=7-(cells.length%7);if(remaining<7)for(let d=1;d<=remaining;d++){const iso=new Date(year,month+1,d).toISOString().slice(0,10);cells.push({day:d,iso,other:true});}
const prev=()=>setViewDate(new Date(year,month-1,1));
const next=()=>setViewDate(new Date(year,month+1,1));
const entriesForDay=iso=>entries.filter(e=>e.dates?.includes(iso));
const jobs=jobChannels.filter(c=>c.status!=='done');
return <div style={{maxWidth:1000}}>
<div style={s.calNav}><button style={s.calNavBtn} onClick={prev}>←</button><div style={s.calMonth}>{viewDate.toLocaleDateString('en-NZ',{month:'long',year:'numeric'})}</div><button style={s.calNavBtn} onClick={next}>→</button></div>
<div style={s.legend}>{jobs.map(j=><div key={j.id} style={s.legendItem}><div style={{...s.legendDot,background:getColor(j.colorId).bar}}/>{j.name}</div>)}</div>
<div style={s.calGrid}>
{['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={s.calHeadCell}>{d}</div>)}
{cells.map((c,i)=>{const dayEntries=entriesForDay(c.iso);return <div key={i} style={{...s.calCell,...(c.today?s.calCellToday:{}),...(c.other?s.calCellOther:{})}} onClick={()=>{setDefaultDate(c.iso);setBooking({});}}><div style={s.calDay}>{c.day}</div><div style={s.calBarsRow}>{dayEntries.map(e=><div key={e.id} style={{...s.calBar,background:getColor(e.colorId).bar}} onClick={ev=>{ev.stopPropagation();setSelected(e);}}>{e.projectName?.slice(0,8)}</div>)}</div></div>;})}
</div>
<div style={{marginTop:20,display:'flex',gap:12,flexWrap:'wrap'}}><button style={s.calNewBtn} onClick={()=>setBooking({})}>+ New</button></div>
{selected&&<div style={s.entryDetail}><div style={s.entryHead}><div style={{...s.entryColorBar,background:getColor(selected.colorId).bar}}/><span style={s.entryProjectName} onClick={()=>onJump(selected.projectId)}>{selected.projectName}</span><span style={s.entryDates}>{selected.days>1?formatShortDate(selected.startDate)+' → '+formatShortDate(selected.dates[selected.dates.length-1])+' · '+selected.days+'d':formatShortDate(selected.startDate)}</span><button style={s.copyBtn} onClick={()=>setBooking(selected)}>✏️ Edit</button><button style={{...s.copyBtn,color:'var(--danger)'}} onClick={()=>{if(confirm('Delete?')){onDelete(selected.id);setSelected(null);}}}>🗑</button></div>{selected.technicians&&<div style={s.entryField}><div style={s.entryFieldLabel}>Technicians</div><div style={s.entryFieldText}>{selected.technicians}</div></div>}{selected.tools&&<div style={s.entryField}><div style={s.entryFieldLabel}>Tools</div><div style={s.entryFieldText}>{renderWithMentions(selected.tools,allChannels,onJump)}</div></div>}{selected.comment&&<div style={s.entryField}><div style={s.entryFieldLabel}>Comment</div><div style={s.entryFieldText}>{renderWithMentions(selected.comment,allChannels,onJump)}</div></div>}</div>}
{booking&&<CalendarBookingModal onClose={()=>setBooking(null)} onSave={e=>{onSave(e);setBooking(null);setSelected(e);}} jobChannels={jobs} allChannels={allChannels} getCategory={getCategory} editing={booking.id?booking:null} defaultDate={defaultDate}/>}
</div>;}

// Notes Feed
function NotesFeed({channelId,threadId,notes,channels,onAdd,onJump}){
const list=notes.filter(n=>n.channelId===channelId&&n.threadId===threadId).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
const[text,setText]=useState('');
const inputRef=useRef(null);
const mentions=useMentions(text,setText,channels,channelId);
const send=()=>{if(!text.trim())return;onAdd({id:'note-'+Date.now().toString(36),channelId,threadId,text:text.trim(),createdAt:new Date().toISOString()});setText('');};
return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
<div style={s.noteInputWrap}><MentionDropdown mentions={mentions} inputRef={inputRef} getCategory={()=>null}/><textarea ref={inputRef} style={s.noteInput} value={text} onChange={e=>mentions.handleChange(e)} onKeyDown={e=>{if(mentions.handleKeyDown(e,inputRef))return;if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Type note... # to mention" rows={3}/></div>
<button style={s.sendBtn} onClick={send}>Send</button>
<div style={{flex:1,overflowY:'auto',marginTop:16}}>{list.length===0?<div style={{...s.empty,height:'50%'}}><span style={s.emptyIcon}>💬</span><span style={s.emptyText}>No notes</span></div>:list.map(n=><div key={n.id} style={s.note}><div style={s.noteText}>{renderWithMentions(n.text,channels,onJump)}</div><div style={s.noteMeta}>{formatTime(n.createdAt)}</div></div>)}</div>
</div>;}

// Thread View - routes to appropriate view
function ThreadView({channel,threadId,notes,incidents,timesheets,channels,allCrew,currentUserId,onAddNote,onJump,onAddIncident,onDeleteIncident,onAddTimesheet,onEditTimesheet,onApproveWeek,onDeleteTimesheet,onAddWorker,onSetCurrentUser}){
if(threadId==='info')return <InfoDisplay channel={channel}/>;
if(threadId==='toolbox')return <NotesFeed channelId={channel.id} threadId={threadId} notes={notes} channels={channels} onAdd={onAddNote} onJump={onJump}/>;
if(threadId==='incidents')return <ProjectIncidentsView channel={channel} incidents={incidents} channels={channels} onClick={onJump} onAdd={onAddIncident} onDelete={onDeleteIncident}/>;
if(threadId==='rams')return <div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>📋</span><span style={s.emptyText}>RAMS</span><a href={RAMS_URL} target="_blank" rel="noreferrer" style={{...s.primaryBtn,marginTop:16,textDecoration:'none'}}>Open RAMS ↗</a></div>;
if(threadId==='survey')return <div style={{...s.empty,height:'60%'}}><span style={s.emptyIcon}>🔍</span><span style={s.emptyText}>Survey</span><a href={channel.surveyLink||SURVEY_URL} target="_blank" rel="noreferrer" style={{...s.primaryBtn,marginTop:16,textDecoration:'none'}}>Open Survey ↗</a></div>;
if(threadId==='timesheet'){
const[showAdd,setShowAdd]=useState(false);
return <>
<ProjectTimesheetView project={channel} timesheets={timesheets} allCrew={allCrew} onAddEntry={()=>setShowAdd(true)} onEditEntry={onEditTimesheet} onApproveWeek={onApproveWeek} onDeleteEntry={onDeleteTimesheet}/>
{showAdd&&<TimesheetEntryModal project={channel} allCrew={allCrew} onClose={()=>setShowAdd(false)} onSave={r=>{if(r.type==='entry')onAddTimesheet(r.entry);if(r.type==='add-worker')onAddWorker(r.worker,r.addToProject?channel.id:null);setShowAdd(false);}}/>}
</>;
}
// Custom threads
return <NotesFeed channelId={channel.id} threadId={threadId} notes={notes} channels={channels} onAdd={onAddNote} onJump={onJump}/>;
}

// Category Block
function CategoryBlock({cat,channels,activeId,collapsed,onToggle,onSelect,onAddChannel,getColor}){
const list=channels.filter(c=>c.categoryId===cat.id);
const runningChannels=list.filter(c=>c.status!=='done');
const doneChannels=list.filter(c=>c.status==='done');
const sorted=[...runningChannels,...doneChannels];
return <div style={s.catWrap}>
<div style={s.catHeader} onClick={onToggle}><span style={{...s.catCaret,transform:collapsed?'rotate(-90deg)':'rotate(0)'}}>{collapsed?'▸':'▾'}</span><span style={s.catEmoji}>{cat.emoji}</span><span style={s.catLabel}>{cat.name}</span><span style={s.catCount}>{list.length}</span>{!cat.system&&<button style={s.catAddBtn} onClick={e=>{e.stopPropagation();onAddChannel();}}>+</button>}</div>
{!collapsed&&(sorted.length===0?<div style={s.emptyCat}>No channels</div>:sorted.map(ch=>{
const active=ch.id===activeId;
const done=ch.status==='done';
const hash=ch.type==='job'?'◆':'#';
const color=ch.colorId?getColor(ch.colorId):null;
return <div key={ch.id} style={{...s.chanItem,...(active?s.chanItemActive:{}),...(done?s.chanItemDone:{})}} onClick={()=>onSelect(ch.id)}>
<span style={s.chanHash}>{hash}</span><span style={{...s.chanName,...(active?s.chanNameActive:{})}}>{ch.name}</span>
{color&&<div style={{...s.chanDot,background:color.bar}}/>}
</div>;
}))}
</div>;}

// Main App
function App(){
const[theme,setTheme]=useTheme();
const[data,setData]=useStorage('ral-data-v5',()=>seedData());
const[notes,setNotes]=useStorage('ral-notes',[]);
const[incidents,setIncidents]=useStorage('ral-incidents',[]);
const[calendar,setCalendar]=useStorage('ral-calendar-v2',()=>seedCalendarEntries());
const[crew,setCrew]=useStorage('ral-crew',()=>seedCrew());
const[timesheets,setTimesheets]=useStorage('ral-timesheets',()=>seedTimesheets());
const[currentUserId,setCurrentUserId]=useStorage('ral-current-user','');
const[activeId,setActiveId]=useState(data.channels[0]?.id||'');
const[threadId,setThreadId]=useState('info');
const[modal,setModal]=useState(null);
const[sharedChannel,setSharedChannel]=useState(null);

useEffect(()=>{const h=window.location.hash;if(h.startsWith('#p=')){const ch=decodeObj(h.slice(3));if(ch)setSharedChannel(ch);}},[]);

const categories=data.categories;
const channels=data.channels;
const activeChannel=channels.find(c=>c.id===activeId);
const getCategory=id=>categories.find(c=>c.id===id);

const updateChannel=(id,upd)=>setData(d=>({...d,channels:d.channels.map(c=>c.id===id?{...c,...upd}:c)}));
const addChannel=ch=>setData(d=>({...d,channels:[...d.channels,ch]}));
const addCategory=cat=>setData(d=>({...d,categories:[...d.categories,cat]}));
const toggleCategory=id=>setData(d=>({...d,categories:d.categories.map(c=>c.id===id?{...c,collapsed:!c.collapsed}:c)}));
const addNote=n=>setNotes(ns=>[n,...ns]);
const addIncident=inc=>setIncidents(is=>[inc,...is]);
const deleteIncident=id=>setIncidents(is=>is.filter(i=>i.id!==id));
const addCalendarEntry=e=>setCalendar(c=>[...c.filter(x=>x.id!==e.id),e]);
const deleteCalendarEntry=id=>setCalendar(c=>c.filter(e=>e.id!==id));
const addCrew=(w,projectId)=>{setCrew(c=>[...c,w]);if(projectId)updateChannel(projectId,{crew:[...(channels.find(c=>c.id===projectId)?.crew||[]),w.id]});};
const addTimesheet=t=>setTimesheets(ts=>[...ts,t]);
const editTimesheet=t=>setTimesheets(ts=>ts.map(x=>x.id===t.id?t:x));
const deleteTimesheet=id=>setTimesheets(ts=>ts.filter(t=>t.id!==id));
const approveWeek=(projectId,start,end)=>setTimesheets(ts=>ts.map(t=>t.projectId===projectId&&t.date>=start&&t.date<=end&&t.status==='pending'?{...t,status:'approved',approvedBy:'Manager',approvedAt:new Date().toISOString()}:t));

const selectChannel=(id,thread)=>{setActiveId(id);setThreadId(thread||'info');};
const jumpToChannel=id=>{const ch=channels.find(c=>c.id===id);if(ch){setActiveId(id);setThreadId(ch.type==='job'?'info':null);}};

const allThreads=activeChannel?.type==='job'?[...DEFAULT_THREADS,...(activeChannel.customThreads||[])]:[];
const jobs=channels.filter(c=>c.type==='job');

if(sharedChannel)return <SharedView channel={sharedChannel} onExit={()=>{setSharedChannel(null);window.location.hash='';}}/>;

const renderMain=()=>{
if(!activeChannel)return <div style={s.empty}><span style={s.emptyIcon}>📁</span><span style={s.emptyText}>Select channel</span></div>;
if(activeChannel.type==='job')return <ThreadView channel={activeChannel} threadId={threadId} notes={notes} incidents={incidents} timesheets={timesheets} channels={channels} allCrew={crew} currentUserId={currentUserId} onAddNote={addNote} onJump={jumpToChannel} onAddIncident={()=>setModal({type:'incident',project:activeChannel})} onDeleteIncident={deleteIncident} onAddTimesheet={addTimesheet} onEditTimesheet={editTimesheet} onApproveWeek={(s,e)=>approveWeek(activeChannel.id,s,e)} onDeleteTimesheet={deleteTimesheet} onAddWorker={addCrew} onSetCurrentUser={setCurrentUserId}/>;
if(activeChannel.type==='incidents-bin')return <IncidentsBinView incidentType={activeChannel.incidentType} incidents={incidents} channels={channels} onClick={jumpToChannel} onJump={id=>{jumpToChannel(id);setThreadId('incidents');}}/>;
if(activeChannel.type==='my-hours')return <MyHoursView timesheets={timesheets} allCrew={crew} currentUserId={currentUserId} onSetCurrentUser={setCurrentUserId}/>;
if(activeChannel.type==='materials')return <MaterialsView channel={activeChannel} onUpdate={mats=>updateChannel(activeChannel.id,{materials:mats})} onAdd={()=>setModal({type:'material'})}/>;
if(activeChannel.type==='calendar')return <CalendarView channel={activeChannel} entries={calendar} jobChannels={jobs} allChannels={channels} getCategory={getCategory} onSave={addCalendarEntry} onDelete={deleteCalendarEntry} onJump={jumpToChannel}/>;
if(activeChannel.type==='plain')return <NotesFeed channelId={activeChannel.id} threadId={null} notes={notes} channels={channels} onAdd={addNote} onJump={jumpToChannel}/>;
return <div style={s.empty}><span style={s.emptyIcon}>❓</span><span style={s.emptyText}>Unknown type</span></div>;
};

return <div style={s.app}>
<div style={s.sidebar}>
<div style={s.serverHeader}><div style={s.serverIcon}>RAL</div><div style={s.serverMeta}><div style={s.serverSmallCap}>Altitude Access</div><div style={s.serverName}>Project Manager</div></div><button style={s.themeToggle} onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>{theme==='dark'?'☀️':'🌙'}</button></div>
<div style={s.actionBar}><button style={s.actionBtn} onClick={()=>setModal({type:'job'})}>+ Job</button><button style={s.actionBtn} onClick={()=>setModal({type:'category'})}>+ Category</button></div>
<div style={s.projList}>{categories.map(cat=><CategoryBlock key={cat.id} cat={cat} channels={channels} activeId={activeId} collapsed={cat.collapsed} onToggle={()=>toggleCategory(cat.id)} onSelect={id=>selectChannel(id)} onAddChannel={()=>setModal({type:'channelPicker',categoryId:cat.id,categoryName:cat.name})} getColor={getColor}/>)}</div>
</div>
<div style={s.main}>
{activeChannel&&<><div style={s.header}><div style={s.headerTitleWrap}><div style={s.headerKicker}>{getCategory(activeChannel.categoryId)?.name||'Channel'}</div><div style={s.headerTitle}>{activeChannel.colorId&&<div style={{...s.headerColorDot,background:getColor(activeChannel.colorId).bar}}/>}{activeChannel.name}</div>{activeChannel.startDate&&<div style={s.headerMeta}>Started {formatDate(activeChannel.startDate)}</div>}</div>
{activeChannel.type==='job'&&<><span style={{...s.badge,...(activeChannel.status==='done'?s.badgeSuccess:s.badgePrimary)}} onClick={()=>updateChannel(activeChannel.id,{status:activeChannel.status==='done'?'running':'done'})}>{activeChannel.status==='done'?'✓ Done':'Running'}</span><span style={{...s.badge,...s.badgeGhost}} onClick={()=>setModal({type:'share',channel:activeChannel})}>📤 Share</span><span style={{...s.badge,...s.badgeGhost}} onClick={()=>setModal({type:'editJob',channel:activeChannel})}>✏️ Edit</span></>}
</div>
{activeChannel.type==='job'&&<div style={s.threadBar}>{allThreads.map(t=><button key={t.id} style={{...s.threadBtn,...(threadId===t.id?s.threadBtnActive:{})}} onClick={()=>setThreadId(t.id)}><span>{t.icon}</span><span>{t.label}</span>{!t.fixed&&<button style={s.threadRemove} onClick={e=>{e.stopPropagation();updateChannel(activeChannel.id,{customThreads:activeChannel.customThreads.filter(x=>x.id!==t.id)});}}>×</button>}</button>)}<div style={s.threadDivider}/><button style={s.threadAdd} onClick={()=>setModal({type:'addThread'})}>+</button></div>}
</>}
<div style={s.content}>{renderMain()}</div>
</div>

{modal?.type==='job'&&<JobWizard onClose={()=>setModal(null)} onSave={ch=>{ch.colorId=ch.colorId||pickProjectColor(jobs);addChannel(ch);selectChannel(ch.id);}}/>}
{modal?.type==='editJob'&&<JobWizard editing={modal.channel} onClose={()=>setModal(null)} onSave={ch=>updateChannel(ch.id,ch)}/>}
{modal?.type==='category'&&<CategoryModal onClose={()=>setModal(null)} onSave={addCategory}/>}
{modal?.type==='channelPicker'&&<ChannelTypePicker categoryName={modal.categoryName} onClose={()=>setModal(null)} onPickJob={()=>setModal({type:'job'})} onPickPlain={n=>{const ch={id:'ch-'+Date.now().toString(36),type:'plain',name:n,categoryId:modal.categoryId,createdAt:new Date().toISOString()};addChannel(ch);selectChannel(ch.id);setModal(null);}} onPickMaterials={n=>{const ch={id:'ch-'+Date.now().toString(36),type:'materials',name:n,categoryId:modal.categoryId,materials:[],createdAt:new Date().toISOString()};addChannel(ch);selectChannel(ch.id);setModal(null);}} onPickCalendar={n=>{const ch={id:'ch-'+Date.now().toString(36),type:'calendar',name:n,categoryId:modal.categoryId,createdAt:new Date().toISOString()};addChannel(ch);selectChannel(ch.id);setModal(null);}}/>}
{modal?.type==='addThread'&&<AddThreadModal onClose={()=>setModal(null)} onSave={t=>{updateChannel(activeChannel.id,{customThreads:[...(activeChannel.customThreads||[]),t]});setThreadId(t.id);}}/>}
{modal?.type==='incident'&&<IncidentFormModal project={modal.project} onClose={()=>setModal(null)} onSave={addIncident}/>}
{modal?.type==='material'&&<AddMaterialModal onClose={()=>setModal(null)} onSave={m=>updateChannel(activeChannel.id,{materials:[...(activeChannel.materials||[]),m]})}/>}
{modal?.type==='share'&&<ShareModal channel={modal.channel} onClose={()=>setModal(null)}/>}
</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
